<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Pro X</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

    <aside class="sidebar">
        <div class="logo">
            <h1>Scanner Pro X</h1>
        </div>

        <nav>
            <a href="#" class="active">Dashboard</a>
            <a href="#">Scanner</a>
            <a href="#">Watchlist</a>
            <a href="#">Top Gainers</a>
            <a href="#">Top Losers</a>
            <a href="#">News</a>
            <a href="#">Settings</a>
        </nav>
    </aside>

    <main class="content">

        <header class="topbar">

            <div>
                <h2>Dashboard</h2>
                <p>Professional Day Trading Scanner</p>
            </div>

            <button id="scanBtn">
                Scan Now
            </button>

        </header>

        <section class="cards">

            <div class="card">
                <h3>Market Status</h3>
                <span id="marketStatus">
                    Loading...
                </span>
            </div>

            <div class="card">
                <h3>Watchlist</h3>
                <span>
                    1 Symbol
                </span>
            </div>

            <div class="card">
                <h3>Last Scan</h3>
                <span id="lastScan">
                    Never
                </span>
            </div>

        </section>

        <section class="table-box">

            <table>

                <thead>

                <tr>
                    <th>Symbol</th>
                    <th>Price</th>
                    <th>Change %</th>
                    <th>Status</th>
                </tr>

                </thead>

                <tbody id="watchlistTable">

                <tr>

                    <td>NVDA</td>

                    <td>--</td>

                    <td>--</td>

                    <td>Waiting...</td>

                </tr>

                </tbody>

            </table>

        </section>

    </main>

</div>

<script src="api.js"></script>
<script src="app.js"></script>


</body>
</html>
