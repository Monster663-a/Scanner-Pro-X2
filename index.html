<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner Pro X</title>

<style>
body{
    margin:0;
    background:#0b0f14;
    color:white;
    font-family:Arial,Helvetica,sans-serif;
}

header{
    background:#111827;
    padding:20px;
    text-align:center;
    border-bottom:2px solid #22c55e;
}

h1{
    margin:0;
    color:#22c55e;
}

.container{
    padding:20px;
}

.card{
    background:#161b22;
    border:1px solid #30363d;
    border-radius:10px;
    padding:20px;
    margin-bottom:20px;
}

button{
    background:#22c55e;
    color:black;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#16a34a;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border-bottom:1px solid #30363d;
    padding:12px;
    text-align:left;
}

th{
    color:#22c55e;
}
</style>

</head>

<body>

<header>
<h1>Scanner Pro X</h1>
<p>Professional Day Trading Scanner</p>
</header>

<div class="container">

<div class="card">
<h2>Dashboard</h2>

<p>✅ Project Started Successfully</p>

<button>
Scan Now
</button>

</div>

<div class="card">

<h2>Watchlist</h2>

<table>

<tr>

<th>Symbol</th>

<th>Price</th>

<th>Change %</th>

<th>Status</th>

</tr>

<tr>

<td>NVDA</td>

<td>--</td>

<td>--</td>

<td>Waiting...</td>

</tr>

</table>

</div>

</div>

</body>
</html>
