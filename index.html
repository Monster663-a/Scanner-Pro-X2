<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Pro X</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

    <aside class="sidebar">
        <div class="logo">
            <h1>Scanner Pro X</h1>
        </div>

        <nav>
            <a href="#" class="active">Dashboard</a>
         <a href="#" id="scannerMenu">Scanner</a>
            <a href="#">Watchlist</a>
            <a href="#">Top Gainers</a>
            <a href="#">Top Losers</a>
            <a href="#">News</a>
            <a href="#">Settings</a>
        </nav>
    </aside>
</div>
<section id="scannerPage" style="display:none;">

<div class="card">

<h2>Scanner Filters</h2>

<div class="filters">

<label>Minimum Price</label>
<input id="minPrice" type="number" value="5">

<label>Maximum Price</label>
<input id="maxPrice" type="number" value="100">

<label>Minimum Change %</label>
<input id="minChange" type="number" value="2">

<label>Minimum Volume</label>
<input id="minVolume" type="number" value="500000">

<button id="runScanner">
Scan Stocks
</button>

</div>

</div>

<div class="table-box">

<table>

<thead>

<tr>

<th>Symbol</th>

<th>Price</th>

<th>Change %</th>

<th>Result</th>

</tr>

</thead>

<tbody id="scannerResults">

</tbody>

</table>

</div>

</section>
<div id="dashboardPage">
        <header class="topbar">

            <div>
                <h2>Dashboard</h2>
                <p>Professional Day Trading Scanner</p>
            </div>

            <button id="scanBtn">
                Scan Now
            </button>

        </header>

        <section class="cards">

            <div class="card">
                <h3>Market Status</h3>
                <span id="marketStatus">
                    Loading...
                </span>
            </div>

            <div class="card">
                <h3>Watchlist</h3>
                <span>
                    1 Symbol
                </span>
            </div>

            <div class="card">
                <h3>Last Scan</h3>
                <span id="lastScan">
                    Never
                </span>
            </div>

        </section>

        <section class="table-box">

            <table>

                <thead>

                <tr>
                    <th>Symbol</th>
                    <th>Price</th>
                    <th>Change %</th>
                    <th>Status</th>
                </tr>

                </thead>

                <tbody id="watchlistTable">

</tbody>

            </table>

        </section>

    </main>

</div>

<script src="api.js"></script>
<script src="app.js"></script>


</body>
</html>
